name: CI

on:
  push:
  pull_request:

jobs:
  lightweight-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install lightweight development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run unit tests
        run: python -m pytest
      - name: Run lint
        run: python -m ruff check .
      - name: Check shell scripts
        run: find scripts -name "*.sh" -print0 | xargs -0 bash -n
      - name: Run repository preflight
        run: python scripts/preflight.py
      - name: Compile Python sources
        run: python -m compileall -q Evo_1 MetaWorld_evaluation LIBERO_evaluation scripts
